# CD — deploy to Azure Container Apps on push to main, after CI passes.
#
# Auth is OIDC (federated credentials) — NO Azure secrets stored in GitHub.
# `azd pipeline config` sets this up: a user-assigned managed identity with a
# federated credential scoped to `repo:<owner>/<repo>:ref:refs/heads/main`,
# Contributor scoped to just the rg-gloss resource group (not the whole
# subscription), and these repo VARIABLES:
#
#   AZURE_CLIENT_ID         (the managed identity's client id)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# They are identifiers, not secrets. The workflow no-ops until AZURE_CLIENT_ID is
# present, so merging this file changes nothing until you're ready.
#
# This workflow only ever runs `azd deploy` (build + push image + roll the
# Container App) — never `azd provision`. `azd provision` re-runs the Bicep
# template, which is subscription-scoped (it creates the resource group
# itself), so it needs subscription-level permission; this identity is
# deliberately scoped to Contributor on rg-gloss only. Re-provisioning from CI
# would mean widening that back to the whole subscription, which isn't worth
# it for what should just be "build and roll out the new image". If the infra
# itself ever needs to change, run `azd provision` locally instead.
name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {} # allow manual deploys from the Actions tab

permissions:
  id-token: write # required for OIDC federated auth
  contents: read

jobs:
  deploy:
    name: azd deploy
    runs-on: ubuntu-latest
    # Only run if CI succeeded (or this was triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: gloss
      AZURE_LOCATION: westus2
      AZURE_CONTAINER_REGISTRY_ENDPOINT: ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
      AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
    steps:
      - name: Check credentials are configured
        id: guard
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_CLIENT_ID not set — skipping deploy. Configure OIDC variables to enable CD."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.configured == 'true'

      - name: Install azd
        if: steps.guard.outputs.configured == 'true'
        uses: Azure/setup-azd@v2

      - name: Sign in to Azure (OIDC, no secrets)
        if: steps.guard.outputs.configured == 'true'
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider github \
            --tenant-id "$AZURE_TENANT_ID"

      # A fresh CI runner has no local azd environment state (that lives only
      # in the gitignored .azure/ folder on whoever's machine ran `azd up`), so
      # `azd deploy` alone doesn't know which registry to push to. These are
      # stable, non-secret outputs from the one-time `azd up` -- seed them
      # directly instead of re-running `azd provision` (which would need
      # subscription-level permission this identity intentionally doesn't have).
      - name: Seed environment values
        if: steps.guard.outputs.configured == 'true'
        run: |
          azd env set AZURE_CONTAINER_REGISTRY_ENDPOINT "$AZURE_CONTAINER_REGISTRY_ENDPOINT"
          azd env set AZURE_CONTAINER_REGISTRY_NAME "$AZURE_CONTAINER_REGISTRY_NAME"

      # Build the image (remote build in ACR) and roll the Container App.
      - name: Deploy
        if: steps.guard.outputs.configured == 'true'
        run: azd deploy --no-prompt

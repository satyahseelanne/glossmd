# CD — deploy to Azure Container Apps on push to main, after CI passes.
#
# Auth is OIDC (federated credentials) — NO secrets stored in GitHub. Once an
# admin runs `azd pipeline config` (or manually creates an app registration with
# a federated credential for this repo + grants it Contributor on rg-gloss), set
# these three repo VARIABLES (Settings → Secrets and variables → Actions →
# Variables), and this workflow goes live:
#
#   AZURE_CLIENT_ID         (the app registration's client id)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# They are identifiers, not secrets. The workflow no-ops until AZURE_CLIENT_ID is
# present, so merging this file changes nothing until you're ready.
name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {} # allow manual deploys from the Actions tab

permissions:
  id-token: write # required for OIDC federated auth
  contents: read

jobs:
  deploy:
    name: azd deploy
    runs-on: ubuntu-latest
    # Only run if CI succeeded (or this was triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: gloss
      AZURE_LOCATION: westus2
    steps:
      - name: Check credentials are configured
        id: guard
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_CLIENT_ID not set — skipping deploy. Configure OIDC variables to enable CD."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.configured == 'true'

      - name: Install azd
        if: steps.guard.outputs.configured == 'true'
        uses: Azure/setup-azd@v2

      - name: Sign in to Azure (OIDC, no secrets)
        if: steps.guard.outputs.configured == 'true'
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider github \
            --tenant-id "$AZURE_TENANT_ID"

      # Build the image (remote build in ACR) and roll the Container App.
      # Provisioning already happened; deploy is enough for app updates.
      - name: Deploy
        if: steps.guard.outputs.configured == 'true'
        run: azd deploy --no-prompt

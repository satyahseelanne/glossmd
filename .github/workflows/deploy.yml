# CD — deploy to Azure Container Apps on push to main, after CI passes.
#
# Auth is OIDC (federated credentials) — NO Azure secrets stored in GitHub.
# `azd pipeline config` sets this up: a user-assigned managed identity with a
# federated credential scoped to `repo:<owner>/<repo>:ref:refs/heads/main`,
# Contributor scoped to just the rg-gloss resource group (not the whole
# subscription), and these repo VARIABLES:
#
#   AZURE_CLIENT_ID         (the managed identity's client id)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# They are identifiers, not secrets. The workflow no-ops until AZURE_CLIENT_ID is
# present, so merging this file changes nothing until you're ready.
#
# `azd provision` re-runs the Bicep template on every deploy so infra changes
# take effect too, not just app code. main.bicep is subscription-scoped (it
# creates the resource group itself), so submitting/validating that deployment
# needs subscription-level permission for the deployment operation itself --
# but NOT for the resources it manages. This identity has two separate grants:
#   - Contributor, scoped to rg-gloss only (actual resource read/write)
#   - "Gloss CD Deployment Operator" (custom role, Microsoft.Resources/deployments/*
#     only), scoped to the subscription (lets ARM validate/create the
#     deployment; grants no permission over any resource)
# So this identity can never touch anything outside rg-gloss, even though
# provisioning requires a subscription-scope deployment.
#
# GLOSS_OAUTH_CLIENT_SECRET must also exist as a repo *secret* (Settings →
# Secrets and variables → Actions → Secrets) — the Bicep template silently
# falls back to a placeholder if it's missing, which would overwrite the real
# OAuth secret on the running app.
name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {} # allow manual deploys from the Actions tab

permissions:
  id-token: write # required for OIDC federated auth
  contents: read

jobs:
  deploy:
    name: azd deploy
    runs-on: ubuntu-latest
    # Only run if CI succeeded (or this was triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: gloss
      AZURE_LOCATION: westus2
      GLOSS_OAUTH_CLIENT_ID: ${{ vars.GLOSS_OAUTH_CLIENT_ID }}
      GLOSS_BASE_URL: ${{ vars.GLOSS_BASE_URL }}
      GLOSS_OAUTH_CLIENT_SECRET: ${{ secrets.GLOSS_OAUTH_CLIENT_SECRET }}
    steps:
      - name: Check credentials are configured
        id: guard
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_CLIENT_ID not set — skipping deploy. Configure OIDC variables to enable CD."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.configured == 'true'

      - name: Install azd
        if: steps.guard.outputs.configured == 'true'
        uses: Azure/setup-azd@v2

      - name: Sign in to Azure (OIDC, no secrets)
        if: steps.guard.outputs.configured == 'true'
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider github \
            --tenant-id "$AZURE_TENANT_ID"

      # A fresh CI runner has no local azd environment state (that lives only
      # in the gitignored .azure/ folder on whoever's machine ran `azd up`), so
      # `azd deploy` alone doesn't know the ACR endpoint or other outputs.
      # `azd provision` re-resolves the Bicep template into this runner's
      # environment -- a no-op against Azure if nothing changed, or applies
      # infra changes if something did.
      - name: Provision Infrastructure
        if: steps.guard.outputs.configured == 'true'
        run: azd provision --no-prompt

      # Build the image (remote build in ACR) and roll the Container App.
      - name: Deploy
        if: steps.guard.outputs.configured == 'true'
        run: azd deploy --no-prompt

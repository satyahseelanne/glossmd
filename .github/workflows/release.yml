# Release — tag and publish a GitHub Release after every successful deploy.
#
# Chains off CD (which itself only runs after CI passes), so a release only
# happens once the commit has been tested and actually deployed. Version is
# calendar-based + the run number for uniqueness (this repo doesn't use
# semantic-version bumps per merge), e.g. 2026.07.06-42. Release notes are
# auto-generated by GitHub from merged PRs since the last release.
name: Release

on:
  workflow_run:
    workflows: [CD]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute version
        id: version
        run: echo "tag=$(date -u +%Y.%m.%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --target "${{ github.event.workflow_run.head_sha }}" \
            --generate-notes
